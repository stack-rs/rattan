- name: set service configuration directory
  become: true
  ansible.builtin.file:
    path: /etc/runner
    state: directory

- name: write docker client proxy config for job-spawned containers
  become: true
  ansible.builtin.copy:
    dest: /etc/runner/docker-config.json
    content: |
      {
        "proxies": {
          "default": {
            "httpProxy": "{{ http_proxy | default('') }}",
            "httpsProxy": "{{ http_proxy | default('') }}",
            "noProxy": "localhost,127.0.0.1,::1"
          }
        }
      }

- name: copy github-runner docker-compose file
  become: true
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /etc/runner/docker-compose.yml

- name: poll a image
  become: true
  community.docker.docker_image:
    name: "docker.io/myoung34/github-runner:{{ tag }}"
    source: pull

- name: start the github-runner container
  become: true
  community.docker.docker_compose_v2:
    project_src: /etc/runner
    state: present
